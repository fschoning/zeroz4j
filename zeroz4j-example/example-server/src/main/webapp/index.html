<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover"/>
        <title>TeaVM Flavour Client</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                corePlugins: {
                    preflight: false
                }
            }
        </script>
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5.6.14/daisyui.css" rel="stylesheet" type="text/css" />
        <!-- Unregister old old service workers to fix cache issues -->
        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) {
                        registration.unregister();
                        console.log('Unregistered old service worker.');
                    }
                });
            }
        </script>
    </head>
    <body class="bg-base-100 h-screen w-screen overflow-hidden m-0 p-0 text-base-content" data-theme="dark">
        <div id="app-root"></div>
        <script type="text/javascript" charset="utf-8" src="js/classes.js"></script>
        <script>
            main();
        </script>
    </body>
</html>
