name: Publish ZeroZ4j packages

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file

    - name: Publish to GitHub Packages
      run: mvn -B deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    # NOTE FOR PUBLISHING TO MAVEN CENTRAL:
    # To publish to Maven Central instead of GitHub Packages, you need to:
    # 1. Register a namespace on Sonatype OSSRH (issues.sonatype.org)
    # 2. Add maven-gpg-plugin to your pom.xml to sign the artifacts
    # 3. Add maven-javadoc-plugin and maven-source-plugin
    # 4. Set up secrets: OSSRH_USERNAME, OSSRH_PASSWORD, GPG_PRIVATE_KEY, GPG_PASSPHRASE
    # 5. Change the server-id to 'ossrh' and deploy using those secrets.
